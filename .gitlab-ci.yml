stages:
  - validate
  - start-vms

variables:
  # Nexus PyPI - Edit these GitLab Variables
  PIP_INDEX_URL: "${NEXUS_PIP_INDEX_URL}"
  PIP_EXTRA_INDEX_URL: "${NEXUS_PIP_EXTRA_INDEX_URL}"
  PIP_TRUSTED_HOST: "${NEXUS_TRUSTED_HOST}"

# Validation - Runs for ALL pipelines (manual + scheduled)
validate-nexus:
  stage: validate
  image: python:3.11-alpine
  script:
    - echo "🔍 Nexus + Azure validation..."
    - echo "Index: $PIP_INDEX_URL"
    - echo "Trusted: $PIP_TRUSTED_HOST"
    - echo "Tenant: ${AZURE_TENANT_ID:0:8}..."
    
    # Test pip config
    - pip config list | grep -E "(index-url|trusted-host)" || true
    
    # Nexus connectivity test
    - pip index versions azure-identity --index-url "$PIP_INDEX_URL" --trusted-host "$PIP_TRUSTED_HOST" || true
    
    # Azure SP test
    - |
      python -c "
      import os
      print('✅ Azure vars present:', all([os.getenv(v) for v in ['AZURE_TENANT_ID', 'AZURE_CLIENT_ID', 'AZURE_CLIENT_SECRET']]))
      "
  rules:
    - when: always  # ← FIXED: Runs for ALL pipelines
  allow_failure: true

# Scheduled job (9 AM IST)
start-morning-vms:
  stage: start-vms
  image: python:3.11
  needs: ["validate-nexus"]
  before_script:
    - pip config set global.index-url "$PIP_INDEX_URL"
    - pip config set global.extra-index-url "$PIP_EXTRA_INDEX_URL"
    - pip config set global.trusted-host "$PIP_TRUSTED_HOST"
    
    # Install from Nexus
    - pip install --no-cache-dir azure-identity azure-mgmt-compute
    
    # Test SP auth
    - python -c "from azure.identity import ClientSecretCredential; print('✅ SP ready')"
  
  script:
    - echo "🚀 Scheduled VM start: $(date)"
    - python start_vms.py
    
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  artifacts:
    paths:
      - vm-status.*
      - report.md
    expire_in: 1 week
    reports:
      dotenv: vm-status.env

# Manual test button (runs anytime)
start-vms-test:
  stage: start-vms
  extends: 
    - start-morning-vms
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  variables:
    DRY_RUN: "true"  # Optional: Add dry-run logic to script

# On-commit validation
validate-script:
  stage: validate
  image: python:3.11-alpine
  script:
    - pip install --no-cache-dir azure-identity azure-mgmt-compute || true
    - python -m py_compile start_vms.py
    - echo "✅ Script syntax OK"
  rules:
    - changes:
        - start_vms.py
        - config.json
